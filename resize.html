<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线图片尺寸修改工具 - 调整图片尺寸，支持按比例缩放。无需注册，移动端完美适配。">
    <meta name="keywords" content="图片尺寸修改,图片缩放,调整图片大小,在线修改尺寸">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://jinqizi.eu.cc/resize.html">
    <title>免费在线图片尺寸修改 - 按比例缩放 | 无需注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">🖼️ 图片工具站</a>
                <nav>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="tool-page">
                <a href="index.html" class="back-link">← 返回首页</a>
                <div class="tool-header">
                    <h1>图片尺寸修改工具</h1>
                    <p>调整图片尺寸，支持按比例缩放</p>
                </div>

                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📤</div>
                    <p class="upload-text">拖拽图片到这里或点击上传</p>
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择图片</button>
                </div>

                <div class="control-group" id="controls" style="display: none;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label class="control-label">宽度 (px)</label>
                            <input type="number" id="width" class="control-input" placeholder="宽度">
                        </div>
                        <div>
                            <label class="control-label">高度 (px)</label>
                            <input type="number" id="height" class="control-input" placeholder="高度">
                        </div>
                    </div>
                    <div style="margin-top: 1rem;">
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" id="maintainRatio" checked style="margin-right: 0.5rem;">
                            保持宽高比
                        </label>
                    </div>
                    <div style="margin-top: 1rem; color: var(--text-secondary); font-size: 0.9rem;">
                        原始尺寸: <span id="originalSize">-</span>
                    </div>
                    <button class="btn btn-primary" id="resizeBtn" style="width: 100%; margin-top: 1rem;">开始调整</button>
                </div>

                <div class="preview-area" id="previewArea" style="display: none;">
                    <h3 style="margin-bottom: 1rem;">预览</h3>
                    <img id="preview" class="preview-image" alt="预览">
                </div>

                <div class="result-area" id="resultArea">
                    <p class="result-title">调整完成！</p>
                    <button class="btn btn-success" id="downloadBtn">下载图片</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 图片工具站 - 免费在线图片尺寸修改工具</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script>
        let currentImage = null;
        let resizedCanvas = null;
        let originalWidth = 0;
        let originalHeight = 0;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const previewArea = document.getElementById('previewArea');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const maintainRatio = document.getElementById('maintainRatio');
        const resizeBtn = document.getElementById('resizeBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        setupDragDrop(dropZone, handleFile);
        setupFileInput('fileInput', handleFile);

        widthInput.addEventListener('input', () => {
            if (maintainRatio.checked && currentImage) {
                const ratio = originalHeight / originalWidth;
                heightInput.value = Math.round(widthInput.value * ratio);
            }
        });

        heightInput.addEventListener('input', () => {
            if (maintainRatio.checked && currentImage) {
                const ratio = originalWidth / originalHeight;
                widthInput.value = Math.round(heightInput.value * ratio);
            }
        });

        function handleFile(file) {
            loadImage(file).then(img => {
                currentImage = img;
                originalWidth = img.width;
                originalHeight = img.height;
                
                document.getElementById('originalSize').textContent = `${originalWidth} x ${originalHeight}`;
                widthInput.value = originalWidth;
                heightInput.value = originalHeight;
                
                updatePreview(img.src, 'preview');
                controls.style.display = 'block';
                previewArea.style.display = 'block';
                hideResult();
            }).catch(err => {
                alert('加载图片失败，请重试');
            });
        }

        resizeBtn.addEventListener('click', () => {
            if (!currentImage) return;
            
            const newWidth = parseInt(widthInput.value);
            const newHeight = parseInt(heightInput.value);
            
            if (!newWidth || !newHeight) {
                alert('请输入有效的宽度和高度');
                return;
            }
            
            const canvas = createCanvas(newWidth, newHeight);
            const ctx = canvas.getContext('2d');
            ctx.drawImage(currentImage, 0, 0, newWidth, newHeight);
            
            resizedCanvas = canvas;
            updatePreview(canvas.toDataURL(), 'preview');
            showResult('调整完成！');
        });

        downloadBtn.addEventListener('click', () => {
            if (resizedCanvas) {
                downloadImage(resizedCanvas, 'resized-image.png');
            }
        });
    </script>
</body>
</html>
