<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线图片转PDF工具 - 将图片转换为PDF文档，方便分享。无需注册，移动端完美适配。">
    <meta name="keywords" content="图片转PDF,PDF转换,在线转PDF,图片生成PDF">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://jinqizi.eu.cc/pdf.html">
    <title>免费在线图片转PDF - 生成PDF文档 | 无需注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">🖼️ 图片工具站</a>
                <nav>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="tool-page">
                <a href="index.html" class="back-link">← 返回首页</a>
                <div class="tool-header">
                    <h1>图片转PDF工具</h1>
                    <p>将图片转换为PDF文档，方便分享</p>
                </div>

                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📤</div>
                    <p class="upload-text">拖拽图片到这里或点击上传</p>
                    <input type="file" id="fileInput" class="file-input" accept="image/*" multiple>
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择图片</button>
                </div>

                <div class="control-group" id="controls" style="display: none;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                        <div>
                            <label class="control-label">页面方向</label>
                            <select id="orientation" class="control-select">
                                <option value="portrait">纵向</option>
                                <option value="landscape">横向</option>
                            </select>
                        </div>
                        <div>
                            <label class="control-label">页面大小</label>
                            <select id="pageSize" class="control-select">
                                <option value="a4">A4</option>
                                <option value="letter">Letter</option>
                                <option value="legal">Legal</option>
                            </select>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 1rem;">
                        <label class="control-label">边距 (mm)</label>
                        <input type="number" id="margin" class="control-input" value="10" min="0" max="50">
                    </div>
                    
                    <div id="imageList" style="margin-bottom: 1rem;"></div>
                    
                    <button class="btn btn-primary" id="convertBtn" style="width: 100%;">生成PDF</button>
                </div>

                <div class="result-area" id="resultArea">
                    <p class="result-title">PDF生成完成！</p>
                    <button class="btn btn-success" id="downloadBtn">下载PDF</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 图片工具站 - 免费在线图片转PDF工具</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script>
        let images = [];
        let pdfBlob = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const imageList = document.getElementById('imageList');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        setupDragDrop(dropZone, handleFiles);
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            images = [];
            imageList.innerHTML = '';
            
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    loadImage(file).then(img => {
                        images.push({
                            name: file.name,
                            image: img
                        });
                        updateImageList();
                    });
                }
            });
            
            if (files.length > 0) {
                dropZone.style.display = 'none';
                controls.style.display = 'block';
                hideResult();
            }
        }

        function updateImageList() {
            imageList.innerHTML = '';
            images.forEach((item, index) => {
                const div = document.createElement('div');
                div.style.cssText = 'display: flex; align-items: center; padding: 0.5rem; background: #f8fafc; border-radius: 8px; margin-bottom: 0.5rem;';
                div.innerHTML = `
                    <span style="flex: 1; font-size: 0.9rem;">${index + 1}. ${item.name}</span>
                    <span style="color: var(--text-secondary); font-size: 0.8rem;">${item.image.width} x ${item.image.height}</span>
                `;
                imageList.appendChild(div);
            });
        }

        function getPageSize() {
            const pageSize = document.getElementById('pageSize').value;
            const orientation = document.getElementById('orientation').value;
            const margin = parseInt(document.getElementById('margin').value) * 3.7795;
            
            const sizes = {
                a4: { width: 210, height: 297 },
                letter: { width: 216, height: 279 },
                legal: { width: 216, height: 356 }
            };
            
            let size = sizes[pageSize];
            if (orientation === 'landscape') {
                size = { width: size.height, height: size.width };
            }
            
            return {
                width: (size.width - margin * 2) * 3.7795,
                height: (size.height - margin * 2) * 3.7795
            };
        }

        convertBtn.addEventListener('click', async () => {
            if (images.length === 0) {
                alert('请先选择图片');
                return;
            }
            
            const pageSize = getPageSize();
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = pageSize.width;
            canvas.height = pageSize.height * images.length;
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let yOffset = 0;
            images.forEach(item => {
                const img = item.image;
                const scale = Math.min(
                    pageSize.width / img.width,
                    pageSize.height / img.height
                );
                
                const width = img.width * scale;
                const height = img.height * scale;
                const x = (pageSize.width - width) / 2;
                const y = yOffset + (pageSize.height - height) / 2;
                
                ctx.drawImage(img, x, y, width, height);
                yOffset += pageSize.height;
            });
            
            const dataUrl = canvas.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = 'images.pdf';
            link.click();
            
            showResult('PDF生成完成！');
        });

        downloadBtn.addEventListener('click', () => {
            if (pdfBlob) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(pdfBlob);
                link.download = 'images.pdf';
                link.click();
            }
        });
    </script>
</body>
</html>
