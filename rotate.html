<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线图片旋转翻转工具 - 旋转和翻转图片，调整图片方向。无需注册，移动端完美适配。">
    <meta name="keywords" content="图片旋转,图片翻转,旋转图片,翻转图片,在线旋转">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://jinqizi.eu.cc/rotate.html">
    <title>免费在线图片旋转翻转 - 调整方向 | 无需注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">🖼️ 图片工具站</a>
                <nav>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="tool-page">
                <a href="index.html" class="back-link">← 返回首页</a>
                <div class="tool-header">
                    <h1>图片旋转翻转工具</h1>
                    <p>旋转和翻转图片，调整图片方向</p>
                </div>

                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📤</div>
                    <p class="upload-text">拖拽图片到这里或点击上传</p>
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择图片</button>
                </div>

                <div class="control-group" id="controls" style="display: none;">
                    <label class="control-label">旋转</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
                        <button class="btn btn-secondary" id="rotateLeft">↺ 向左90°</button>
                        <button class="btn btn-secondary" id="rotateRight">↻ 向右90°</button>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label class="control-label">旋转角度</label>
                        <input type="range" id="rotateAngle" class="control-range" min="0" max="360" value="0">
                        <span id="angleValue">0°</span>
                    </div>
                    
                    <label class="control-label">翻转</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
                        <button class="btn btn-secondary" id="flipHorizontal">↔ 水平翻转</button>
                        <button class="btn btn-secondary" id="flipVertical">↕ 垂直翻转</button>
                    </div>
                    
                    <button class="btn btn-primary" id="resetBtn" style="width: 100%;">重置</button>
                </div>

                <div class="preview-area" id="previewArea" style="display: none;">
                    <h3 style="margin-bottom: 1rem;">预览</h3>
                    <img id="preview" class="preview-image" alt="预览">
                </div>

                <div class="result-area" id="resultArea">
                    <p class="result-title">处理完成！</p>
                    <button class="btn btn-success" id="downloadBtn">下载图片</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 图片工具站 - 免费在线图片旋转翻转工具</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script>
        let currentImage = null;
        let processedCanvas = null;
        let rotation = 0;
        let flipH = false;
        let flipV = false;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const previewArea = document.getElementById('previewArea');
        const rotateLeft = document.getElementById('rotateLeft');
        const rotateRight = document.getElementById('rotateRight');
        const rotateAngle = document.getElementById('rotateAngle');
        const angleValue = document.getElementById('angleValue');
        const flipHorizontal = document.getElementById('flipHorizontal');
        const flipVertical = document.getElementById('flipVertical');
        const resetBtn = document.getElementById('resetBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        setupDragDrop(dropZone, handleFile);
        setupFileInput('fileInput', handleFile);

        rotateAngle.addEventListener('input', (e) => {
            rotation = parseInt(e.target.value);
            angleValue.textContent = rotation + '°';
            processImage();
        });

        rotateLeft.addEventListener('click', () => {
            rotation = (rotation - 90 + 360) % 360;
            rotateAngle.value = rotation;
            angleValue.textContent = rotation + '°';
            processImage();
        });

        rotateRight.addEventListener('click', () => {
            rotation = (rotation + 90) % 360;
            rotateAngle.value = rotation;
            angleValue.textContent = rotation + '°';
            processImage();
        });

        flipHorizontal.addEventListener('click', () => {
            flipH = !flipH;
            processImage();
        });

        flipVertical.addEventListener('click', () => {
            flipV = !flipV;
            processImage();
        });

        resetBtn.addEventListener('click', () => {
            rotation = 0;
            flipH = false;
            flipV = false;
            rotateAngle.value = 0;
            angleValue.textContent = '0°';
            processImage();
        });

        function handleFile(file) {
            loadImage(file).then(img => {
                currentImage = img;
                rotation = 0;
                flipH = false;
                flipV = false;
                rotateAngle.value = 0;
                angleValue.textContent = '0°';
                
                updatePreview(img.src, 'preview');
                controls.style.display = 'block';
                previewArea.style.display = 'block';
                hideResult();
            }).catch(err => {
                alert('加载图片失败，请重试');
            });
        }

        function processImage() {
            if (!currentImage) return;
            
            let canvas = currentImage;
            
            if (flipH) {
                canvas = flipImage(canvas, true);
            }
            
            if (flipV) {
                canvas = flipImage(canvas, false);
            }
            
            if (rotation !== 0) {
                canvas = rotateImage(canvas, rotation);
            }
            
            processedCanvas = canvas;
            updatePreview(canvas.toDataURL(), 'preview');
            showResult('处理完成！');
        }

        downloadBtn.addEventListener('click', () => {
            if (processedCanvas) {
                downloadImage(processedCanvas, 'rotated-image.png');
            }
        });
    </script>
</body>
</html>
