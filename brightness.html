<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线图片亮度对比度调整工具 - 调整图片亮度和对比度，优化效果。无需注册，移动端完美适配。">
    <meta name="keywords" content="亮度调整,对比度调整,图片优化,在线调色">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://haoxiangmu.ccwu.cc/brightness.html">
    <title>免费在线图片亮度对比度 - 优化效果 | 无需注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">🖼️ 图片工具站</a>
                <nav>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="tool-page">
                <a href="index.html" class="back-link">← 返回首页</a>
                <div class="tool-header">
                    <h1>图片亮度对比度调整</h1>
                    <p>调整图片亮度和对比度，优化效果</p>
                </div>

                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📤</div>
                    <p class="upload-text">拖拽图片到这里或点击上传</p>
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择图片</button>
                </div>

                <div class="control-group" id="controls" style="display: none;">
                    <div>
                        <label class="control-label">亮度: <span id="brightnessValue">0</span></label>
                        <input type="range" id="brightness" class="control-range" min="-100" max="100" value="0">
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary);">
                            <span>-100</span>
                            <span>0</span>
                            <span>+100</span>
                        </div>
                    </div>
                    
                    <div style="margin-top: 1.5rem;">
                        <label class="control-label">对比度: <span id="contrastValue">0</span></label>
                        <input type="range" id="contrast" class="control-range" min="-100" max="100" value="0">
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary);">
                            <span>-100</span>
                            <span>0</span>
                            <span>+100</span>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
                        <button class="btn btn-secondary" id="resetBtn">重置</button>
                        <button class="btn btn-primary" id="applyBtn">应用调整</button>
                    </div>
                </div>

                <div class="preview-area" id="previewArea" style="display: none;">
                    <h3 style="margin-bottom: 1rem;">预览</h3>
                    <img id="preview" class="preview-image" alt="预览">
                </div>

                <div class="result-area" id="resultArea">
                    <p class="result-title">调整完成！</p>
                    <button class="btn btn-success" id="downloadBtn">下载图片</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 图片工具站 - 免费在线图片亮度对比度调整工具</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script>
        let currentImage = null;
        let processedCanvas = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const previewArea = document.getElementById('previewArea');
        const brightness = document.getElementById('brightness');
        const brightnessValue = document.getElementById('brightnessValue');
        const contrast = document.getElementById('contrast');
        const contrastValue = document.getElementById('contrastValue');
        const resetBtn = document.getElementById('resetBtn');
        const applyBtn = document.getElementById('applyBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        setupDragDrop(dropZone, handleFile);
        setupFileInput('fileInput', handleFile);

        brightness.addEventListener('input', (e) => {
            brightnessValue.textContent = e.target.value > 0 ? `+${e.target.value}` : e.target.value;
        });

        contrast.addEventListener('input', (e) => {
            contrastValue.textContent = e.target.value > 0 ? `+${e.target.value}` : e.target.value;
        });

        function handleFile(file) {
            loadImage(file).then(img => {
                currentImage = img;
                brightness.value = 0;
                contrast.value = 0;
                brightnessValue.textContent = '0';
                contrastValue.textContent = '0';
                
                updatePreview(img.src, 'preview');
                controls.style.display = 'block';
                previewArea.style.display = 'block';
                hideResult();
            }).catch(err => {
                alert('加载图片失败，请重试');
            });
        }

        function processImage() {
            if (!currentImage) return;
            
            const brightnessVal = parseInt(brightness.value);
            const contrastVal = parseInt(contrast.value);
            
            let canvas = currentImage;
            
            if (brightnessVal !== 0) {
                canvas = adjustBrightness(canvas, brightnessVal * 2.55);
            }
            
            if (contrastVal !== 0) {
                canvas = adjustContrast(canvas, contrastVal);
            }
            
            processedCanvas = canvas;
            updatePreview(canvas.toDataURL(), 'preview');
            showResult('调整完成！');
        }

        resetBtn.addEventListener('click', () => {
            brightness.value = 0;
            contrast.value = 0;
            brightnessValue.textContent = '0';
            contrastValue.textContent = '0';
            
            if (currentImage) {
                updatePreview(currentImage.src, 'preview');
                hideResult();
            }
        });

        applyBtn.addEventListener('click', processImage);

        downloadBtn.addEventListener('click', () => {
            if (processedCanvas) {
                downloadImage(processedCanvas, 'adjusted-image.png');
            }
        });
    </script>
</body>
</html>
