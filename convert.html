<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线图片格式转换工具 - JPG/PNG/WebP格式互转，快速转换。无需注册，移动端完美适配。">
    <meta name="keywords" content="图片格式转换,JPG转PNG,PNG转JPG,WebP转换,在线格式转换">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://jinqizi.eu.cc/convert.html">
    <title>免费在线图片格式转换 - JPG/PNG/WebP | 无需注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">🖼️ 图片工具站</a>
                <nav>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="tool-page">
                <a href="index.html" class="back-link">← 返回首页</a>
                <div class="tool-header">
                    <h1>图片格式转换工具</h1>
                    <p>JPG/PNG/WebP格式互转，快速转换</p>
                </div>

                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📤</div>
                    <p class="upload-text">拖拽图片到这里或点击上传</p>
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择图片</button>
                </div>

                <div class="control-group" id="controls" style="display: none;">
                    <label class="control-label">目标格式</label>
                    <select id="formatSelect" class="control-select">
                        <option value="jpg">JPG</option>
                        <option value="png">PNG</option>
                        <option value="webp">WebP</option>
                    </select>
                    <button class="btn btn-primary" id="convertBtn" style="width: 100%; margin-top: 1rem;">开始转换</button>
                </div>

                <div class="preview-area" id="previewArea" style="display: none;">
                    <h3 style="margin-bottom: 1rem;">预览</h3>
                    <img id="preview" class="preview-image" alt="预览">
                </div>

                <div class="result-area" id="resultArea">
                    <p class="result-title">转换完成！</p>
                    <button class="btn btn-success" id="downloadBtn">下载图片</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 图片工具站 - 免费在线图片格式转换工具</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script>
        let currentImage = null;
        let convertedDataUrl = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const previewArea = document.getElementById('previewArea');
        const formatSelect = document.getElementById('formatSelect');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        setupDragDrop(dropZone, handleFile);
        setupFileInput('fileInput', handleFile);

        function handleFile(file) {
            loadImage(file).then(img => {
                currentImage = img;
                updatePreview(img.src, 'preview');
                controls.style.display = 'block';
                previewArea.style.display = 'block';
                hideResult();
            }).catch(err => {
                alert('加载图片失败，请重试');
            });
        }

        convertBtn.addEventListener('click', () => {
            if (!currentImage) return;
            
            const format = formatSelect.value;
            convertedDataUrl = convertFormat(currentImage, format);
            
            updatePreview(convertedDataUrl, 'preview');
            showResult('转换完成！');
        });

        downloadBtn.addEventListener('click', () => {
            if (convertedDataUrl) {
                const format = formatSelect.value;
                downloadDataURL(convertedDataUrl, `converted-image.${format}`);
            }
        });
    </script>
</body>
</html>
