<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线图片Base64转换工具 - 图片转Base64编码，方便嵌入代码。无需注册，移动端完美适配。">
    <meta name="keywords" content="Base64转换,图片转Base64,Base64编码,在线Base64">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://jinqizi.eu.cc/base64.html">
    <title>免费在线图片Base64转换 - 嵌入代码 | 无需注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">🖼️ 图片工具站</a>
                <nav>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="tool-page">
                <a href="index.html" class="back-link">← 返回首页</a>
                <div class="tool-header">
                    <h1>图片Base64转换工具</h1>
                    <p>图片转Base64编码，方便嵌入代码</p>
                </div>

                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📤</div>
                    <p class="upload-text">拖拽图片到这里或点击上传</p>
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择图片</button>
                </div>

                <div class="control-group" id="controls" style="display: none;">
                    <div>
                        <label class="control-label">输出格式</label>
                        <select id="outputFormat" class="control-select">
                            <option value="data">Data URL (data:image/...)</option>
                            <option value="base64">纯Base64编码</option>
                            <option value="css">CSS background-image</option>
                            <option value="html">HTML img 标签</option>
                        </select>
                    </div>
                    
                    <div style="margin-top: 1.5rem;">
                        <label class="control-label">图片信息</label>
                        <div style="background: #f8fafc; padding: 1rem; border-radius: 8px; font-size: 0.9rem;">
                            <p>文件名: <span id="fileName">-</span></p>
                            <p>尺寸: <span id="imageSize">-</span></p>
                            <p>文件大小: <span id="fileSize">-</span></p>
                        </div>
                    </div>
                    
                    <div style="margin-top: 1.5rem;">
                        <label class="control-label">Base64编码结果</label>
                        <textarea id="base64Output" class="control-input" style="height: 200px; font-family: monospace; font-size: 0.85rem;" readonly></textarea>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                        <button class="btn btn-primary" id="copyBtn">复制到剪贴板</button>
                        <button class="btn btn-secondary" id="downloadBtn">下载为文件</button>
                    </div>
                </div>

                <div class="preview-area" id="previewArea" style="display: none;">
                    <h3 style="margin-bottom: 1rem;">图片预览</h3>
                    <img id="preview" class="preview-image" alt="预览">
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 图片工具站 - 免费在线图片Base64转换工具</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script>
        let currentImage = null;
        let base64Data = null;
        let fileName = '';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const previewArea = document.getElementById('previewArea');
        const outputFormat = document.getElementById('outputFormat');
        const base64Output = document.getElementById('base64Output');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        setupDragDrop(dropZone, handleFile);
        setupFileInput('fileInput', handleFile);

        outputFormat.addEventListener('change', updateOutput);

        function handleFile(file) {
            fileName = file.name;
            loadImage(file).then(img => {
                currentImage = img;
                
                const canvas = createCanvas(img.width, img.height);
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                base64Data = canvas.toDataURL('image/png');
                
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('imageSize').textContent = `${img.width} x ${img.height}`;
                document.getElementById('fileSize').textContent = formatFileSize(file.size);
                
                updatePreview(base64Data, 'preview');
                updateOutput();
                
                controls.style.display = 'block';
                previewArea.style.display = 'block';
            }).catch(err => {
                alert('加载图片失败，请重试');
            });
        }

        function updateOutput() {
            if (!base64Data) return;
            
            const format = outputFormat.value;
            let output = '';
            
            switch (format) {
                case 'data':
                    output = base64Data;
                    break;
                case 'base64':
                    output = base64Data.split(',')[1];
                    break;
                case 'css':
                    output = `background-image: url('${base64Data}');`;
                    break;
                case 'html':
                    output = `<img src="${base64Data}" alt="${fileName}" />`;
                    break;
            }
            
            base64Output.value = output;
        }

        copyBtn.addEventListener('click', () => {
            base64Output.select();
            document.execCommand('copy');
            alert('已复制到剪贴板！');
        });

        downloadBtn.addEventListener('click', () => {
            if (!base64Data) return;
            
            const blob = new Blob([base64Output.value], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${fileName.split('.')[0]}-base64.txt`;
            link.click();
        });
    </script>
</body>
</html>
