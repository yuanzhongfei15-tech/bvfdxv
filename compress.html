<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线图片压缩工具 - 无损压缩图片，减小文件大小，保持画质。无需注册，快速处理，移动端完美适配。">
    <meta name="keywords" content="图片压缩,无损压缩,在线压缩,免费压缩图片">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://haoxiangmu.ccwu.cc/compress.html">
    <title>免费在线图片压缩 - 无损压缩 | 无需注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">🖼️ 图片工具站</a>
                <nav>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="tool-page">
                <a href="index.html" class="back-link">← 返回首页</a>
                <div class="tool-header">
                    <h1>图片压缩工具</h1>
                    <p>无损压缩图片，减小文件大小，保持画质</p>
                </div>

                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📤</div>
                    <p class="upload-text">拖拽图片到这里或点击上传</p>
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择图片</button>
                </div>

                <div class="control-group" id="controls" style="display: none;">
                    <label class="control-label">压缩质量: <span id="qualityValue">80</span>%</label>
                    <input type="range" id="quality" class="control-range" min="10" max="100" value="80">
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <div style="flex: 1;">
                            <p style="font-size: 0.9rem; color: var(--text-secondary);">原始大小: <span id="originalSize">-</span></p>
                        </div>
                        <div style="flex: 1;">
                            <p style="font-size: 0.9rem; color: var(--text-secondary);">压缩后: <span id="compressedSize">-</span></p>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="compressBtn" style="width: 100%; margin-top: 1rem;">开始压缩</button>
                </div>

                <div class="preview-area" id="previewArea" style="display: none;">
                    <h3 style="margin-bottom: 1rem;">预览</h3>
                    <img id="preview" class="preview-image" alt="预览">
                </div>

                <div class="result-area" id="resultArea">
                    <p class="result-title">压缩完成！</p>
                    <button class="btn btn-success" id="downloadBtn">下载图片</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 图片工具站 - 免费在线图片压缩工具</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script>
        let currentImage = null;
        let compressedDataUrl = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const previewArea = document.getElementById('previewArea');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const compressBtn = document.getElementById('compressBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        setupDragDrop(dropZone, handleFile);
        setupFileInput('fileInput', handleFile);

        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value;
        });

        function handleFile(file) {
            loadImage(file).then(img => {
                currentImage = img;
                document.getElementById('originalSize').textContent = formatFileSize(file.size);
                updatePreview(img.src, 'preview');
                controls.style.display = 'block';
                previewArea.style.display = 'block';
                hideResult();
            }).catch(err => {
                alert('加载图片失败，请重试');
            });
        }

        compressBtn.addEventListener('click', () => {
            if (!currentImage) return;
            
            const quality = parseInt(qualitySlider.value) / 100;
            compressedDataUrl = compressImage(currentImage, quality);
            
            const base64Length = compressedDataUrl.length - (compressedDataUrl.indexOf(',') + 1);
            const padding = (compressedDataUrl.charAt(compressedDataUrl.length - 2) === '=') ? 2 : ((compressedDataUrl.charAt(compressedDataUrl.length - 1) === '=') ? 1 : 0);
            const compressedSize = (base64Length * 0.75) - padding;
            
            document.getElementById('compressedSize').textContent = formatFileSize(compressedSize);
            updatePreview(compressedDataUrl, 'preview');
            showResult('压缩完成！');
        });

        downloadBtn.addEventListener('click', () => {
            if (compressedDataUrl) {
                downloadDataURL(compressedDataUrl, 'compressed-image.jpg');
            }
        });
    </script>
</body>
</html>
