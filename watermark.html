<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线图片加水印工具 - 为图片添加文字水印，保护版权。无需注册，移动端完美适配。">
    <meta name="keywords" content="图片加水印,文字水印,版权保护,在线加水印">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://jinqizi.eu.cc/watermark.html">
    <title>免费在线图片加水印 - 保护版权 | 无需注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">🖼️ 图片工具站</a>
                <nav>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="tool-page">
                <a href="index.html" class="back-link">← 返回首页</a>
                <div class="tool-header">
                    <h1>图片加水印工具</h1>
                    <p>为图片添加文字水印，保护版权</p>
                </div>

                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📤</div>
                    <p class="upload-text">拖拽图片到这里或点击上传</p>
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择图片</button>
                </div>

                <div class="control-group" id="controls" style="display: none;">
                    <div>
                        <label class="control-label">水印文字</label>
                        <input type="text" id="watermarkText" class="control-input" placeholder="输入水印文字" value="© 版权所有">
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                        <div>
                            <label class="control-label">字体大小</label>
                            <input type="number" id="fontSize" class="control-input" value="24" min="10" max="200">
                        </div>
                        <div>
                            <label class="control-label">透明度</label>
                            <input type="range" id="opacity" class="control-range" min="10" max="100" value="50">
                            <span id="opacityValue">50%</span>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                        <div>
                            <label class="control-label">水平位置</label>
                            <select id="alignH" class="control-select">
                                <option value="left">左对齐</option>
                                <option value="center">居中</option>
                                <option value="right" selected>右对齐</option>
                            </select>
                        </div>
                        <div>
                            <label class="control-label">垂直位置</label>
                            <select id="alignV" class="control-select">
                                <option value="top">顶部</option>
                                <option value="center">居中</option>
                                <option value="bottom" selected>底部</option>
                            </select>
                        </div>
                    </div>
                    
                    <div style="margin-top: 1rem;">
                        <label class="control-label">颜色</label>
                        <input type="color" id="watermarkColor" class="control-input" value="#ffffff" style="height: 50px;">
                    </div>
                    
                    <button class="btn btn-primary" id="applyBtn" style="width: 100%; margin-top: 1rem;">应用水印</button>
                </div>

                <div class="preview-area" id="previewArea" style="display: none;">
                    <h3 style="margin-bottom: 1rem;">预览</h3>
                    <img id="preview" class="preview-image" alt="预览">
                </div>

                <div class="result-area" id="resultArea">
                    <p class="result-title">水印添加完成！</p>
                    <button class="btn btn-success" id="downloadBtn">下载图片</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 图片工具站 - 免费在线图片加水印工具</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script>
        let currentImage = null;
        let watermarkedCanvas = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const previewArea = document.getElementById('previewArea');
        const watermarkText = document.getElementById('watermarkText');
        const fontSize = document.getElementById('fontSize');
        const opacity = document.getElementById('opacity');
        const opacityValue = document.getElementById('opacityValue');
        const alignH = document.getElementById('alignH');
        const alignV = document.getElementById('alignV');
        const watermarkColor = document.getElementById('watermarkColor');
        const applyBtn = document.getElementById('applyBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        setupDragDrop(dropZone, handleFile);
        setupFileInput('fileInput', handleFile);

        opacity.addEventListener('input', (e) => {
            opacityValue.textContent = e.target.value + '%';
        });

        function handleFile(file) {
            loadImage(file).then(img => {
                currentImage = img;
                updatePreview(img.src, 'preview');
                controls.style.display = 'block';
                previewArea.style.display = 'block';
                hideResult();
            }).catch(err => {
                alert('加载图片失败，请重试');
            });
        }

        function getWatermarkOptions(img) {
            const size = parseInt(fontSize.value);
            const alpha = parseInt(opacity.value) / 100;
            const color = watermarkColor.value;
            const hAlign = alignH.value;
            const vAlign = alignV.value;
            
            const hexToRgba = (hex, a) => {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${a})`;
            };
            
            let x, y, textAlign, textBaseline;
            
            switch (hAlign) {
                case 'left':
                    x = 20;
                    textAlign = 'left';
                    break;
                case 'center':
                    x = img.width / 2;
                    textAlign = 'center';
                    break;
                case 'right':
                    x = img.width - 20;
                    textAlign = 'right';
                    break;
            }
            
            switch (vAlign) {
                case 'top':
                    y = size + 20;
                    textBaseline = 'top';
                    break;
                case 'center':
                    y = img.height / 2;
                    textBaseline = 'middle';
                    break;
                case 'bottom':
                    y = img.height - 20;
                    textBaseline = 'bottom';
                    break;
            }
            
            return {
                fontSize: size,
                color: hexToRgba(color, alpha),
                x: x,
                y: y,
                align: textAlign,
                baseline: textBaseline
            };
        }

        applyBtn.addEventListener('click', () => {
            if (!currentImage) return;
            
            const text = watermarkText.value.trim();
            if (!text) {
                alert('请输入水印文字');
                return;
            }
            
            const options = getWatermarkOptions(currentImage);
            watermarkedCanvas = addWatermark(currentImage, text, options);
            
            updatePreview(watermarkedCanvas.toDataURL(), 'preview');
            showResult('水印添加完成！');
        });

        downloadBtn.addEventListener('click', () => {
            if (watermarkedCanvas) {
                downloadImage(watermarkedCanvas, 'watermarked-image.png');
            }
        });
    </script>
</body>
</html>
